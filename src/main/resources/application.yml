server:
  port: 8081  # 使用2个空格缩进（常用规范）

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/weblog?useUnicode=true&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      host: 192.168.150.129   # Redis服务器地址
      port: 6380              # Redis服务器端口
      password: 123456        # Redis访问密码
      lettuce:
        pool:
          max-active: 10      # 连接池最大连接数
          max-idle: 10        # 连接池中的最大空闲连接
          min-idle: 1         # 连接池中的最小空闲连接
          time-between-eviction-runs: 10s  # 连接空闲检查间隔
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  type-aliases-package: com.fy.weblog.entity

logging:
  level:
    com.fy: info
    org.springframework.web: debug
    org.hibernate: warn
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} - %-5level %logger{36} - %msg%n'
  charset:
    console: UTF-8